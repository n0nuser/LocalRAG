name: RAGAS Evals (PR gate)

on:
  pull_request:
    paths:
      - "localrag/rag/**"
      - "localrag/ingestion/**"
      - "evals/**"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  evals:
    name: RAGAS evaluation (offline, blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run RAGAS evals (offline — no live API required)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python evals/run_evals.py --offline

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-pr-${{ github.event.pull_request.number }}
          path: evals/results/
          if-no-files-found: warn
