# Local development overrides — same image/command as the base compose file;
# the only addition is a Windows-side folder for drag-and-drop document
# copying (WSL2 only; see docs/ingest-upload.md). Files dropped here land at
# /app/uploads-inbox in the container — ingest them with:
#   POST /ingest/directory {"path": "/app/uploads-inbox"}
# or `uv run localrag ingest-dir /app/uploads-inbox` via `docker compose exec`.
# Edit or delete the volume line below if this path doesn't match your
# Windows username. Usage: docker compose up (merged automatically).
services:
  localrag-api:
    volumes:
      - /mnt/c/Users/pjgr2/Desktop/LocalRAG-Ingest:/app/uploads-inbox
